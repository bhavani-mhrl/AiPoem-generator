<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <link rel="stylesheet" href="src/style.css">
    <title>Ai French Poem Generator</title>
</head>
<body>
    <div class="container">
        <header>
        <h1>Ai French poem Generator </h1>
        </header>
        <main>
            <form id="poem-form">
                <input type="text" id="search-input" placeholder="Enter a topic to generate a ai poem..." autofocus required autocomplete="off">
                <input type="submit" id="submit-btn">
            </form>
            <div id="poem">
                <!-- Demain, dès l'aube, à l'heure où blanchit la campagne,
                <br />
                Je partirai. Vois-tu, je sais que tu m'attends. -->
            </div>
        </main>
        <footer>
            This Ai project is coded <a href="https://github.com/bhavani-mhrl" target="_blank">Bhavani Macharla</a> is <a href="https://github.com/bhavani-mhrl/fresh-ai-poem-generator.git" target="_blank">open-sourced on Github</a> and <a href="https://ai-poem-generator-fresh.netlify.app/" target="_blank">hosted on Netlify</a>
        </footer>
    </div>
    <script src="src/index.js"></script>
</body>
</html>
