    <title>Ai French Poem Generator</title>

<body>
    <header>
        <h1>Ai French poem Generator </h1>

    <main>
        <form >
            <input type="text" id="search-input" placeholder="Enter a topic to generate a ai poem..." autofocus required autocomplete="off">

        <div>
            Demain, dès l'aube, à l'heure où blanchit la campagne,
            <br />
            Je partirai. Vois-tu, je sais que tu m'attends.
        </div>
    </main>
    <footer>
        This Ai project is coded <a href="https://github.com/bhavani-mhrl">Bhavani Macharla</a> is <a href="https://github.com/bhavani-mhrl/fresh-ai-poem-generator.git">open-sourced on Github</a> and <a href="https://ai-poem-generator-fresh.netlify.app/">hosted on Netlify</a>
    </footer>

    <script src="src/index.js"></script>

</html>
